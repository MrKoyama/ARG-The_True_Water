<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>隼人 トーク画面 | LIME</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
    background-color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
  }

  .wrapper {
    width: 100%;
    max-width: 450px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background-color: #7494C0;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    position: relative;
  }

  .app-header {
    background-color: #2c2c2c;
    color: #fff;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-sizing: border-box;
    font-size: 18px;
    z-index: 10;
  }

  .header-back {
    font-size: 24px;
    margin-right: 15px;
    cursor: default;
    user-select: none;
  }

  .header-title {
    flex: 1;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-icons span {
    margin-left: 15px;
    font-size: 20px;
    cursor: default;
    user-select: none;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .chat-area::-webkit-scrollbar {
    display: none;
  }

  .message-row {
    display: flex;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    margin-right: 10px;
    flex-shrink: 0;
    background-color: #ccc;
    object-fit: cover;
  }

  .message-content {
    display: flex;
    align-items: flex-end;
    max-width: calc(100% - 65px);
  }

  .balloon {
    background-color: #fff;
    color: #333;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.4;
    position: relative;
    word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  .balloon::before {
    content: "";
    position: absolute;
    top: 14px;
    left: -8px;
    border-top: 4px solid transparent;
    border-right: 10px solid #fff;
    border-bottom: 4px solid transparent;
  }

  .balloon a {
    color: #0645ad;
    text-decoration: underline;
    word-break: break-all;
  }

  .message-time {
    font-size: 11px;
    color: #e0e0e0;
    margin-left: 5px;
    margin-bottom: 2px;
    white-space: nowrap;
  }

  .input-area {
    background-color: #f5f5f5;
    padding: 10px 15px;
    display: flex;
    align-items: center;
    box-sizing: border-box;
    border-top: 1px solid #ddd;
  }

  .input-icon {
    font-size: 24px;
    color: #777;
    margin-right: 12px;
    cursor: default;
    user-select: none;
  }

  .input-box {
    flex: 1;
    background-color: #fff;
    border-radius: 20px;
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    color: #999;
    font-size: 14px;
    border: 1px solid #ddd;
    cursor: default;
    user-select: none;
  }

  .input-right-icon {
    font-size: 24px;
    color: #777;
    margin-left: 12px;
    cursor: default;
    user-select: none;
  }

  .meta-footer {
    background-color: #111;
    color: #888;
    text-align: center;
    padding: 10px 15px;
    font-size: 10px;
    box-sizing: border-box;
  }

  .meta-footer p {
    margin: 3px 0;
    line-height: 1.4;
  }

  @media screen and (max-height: 600px) {
    .wrapper {
      height: 100vh;
    }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header class="app-header">
    <div class="header-back">＜</div>
    <div class="header-title">隼人</div>
    <div class="header-icons">
      <span>🔍</span>
      <span>📞</span>
      <span>≡</span>
    </div>
  </header>

  <main class="chat-area" id="chatArea"></main>

  <div class="input-area" id="inputArea">
    <div class="input-icon">＋</div>
    <div class="input-box">メッセージを入力</div>
    <div class="input-right-icon">☺︎</div>
    <div class="input-right-icon">🎤</div>
  </div>

  <footer class="meta-footer">
    <p>このサイトの内容はフィクションです。登場する人物・団体・名称等は架空のものであり、実在のものとは関係ありません。</p>
    <p>&lt; 1/26 &gt;</p>
  </footer>
</div>


<script>
  const chatArea = document.getElementById('chatArea');
  
  const messagesData = [
    { text: "久しぶり！中学以来だよな！俺のこと覚えてるか？水瀬隼人だ！元気してたか？", delay: 1500 },
    { text: "あんときは色々馬鹿やってたよな！", delay: 2500 },
    { text: "突然で悪いんだけどさ！ちょっとこれ見てくれよ！", delay: 2500 },
    { text: "<a href='water.html'>奇跡の水 | 天水恩寵会</a>", delay: 1500 },
    { text: "もう今は普通の水じゃなくてさ、こういうちゃんとした水が良いんだよ！お前にもおすすめしたくて連絡したんだわ！", delay: 3500 },
    { text: "これ、普通は手に入んないんだけど、俺が紹介したらお前もこの水飲めるようになるぜ！", delay: 4000 },
    { text: "怪しいって思ってるだろ？まあ実際俺もこんなメッセ来たら速攻ブロックするわ。", delay: 4500 },
    { text: "だけどな、お前なら興味持ってくれんじゃねーかなって。", delay: 3500 },
    { text: "好きだったろ？こういう怪しいもんに首突っ込むの。", delay: 2500 },
    { text: "まあこの水、お前なりに調べてみてくれや。きっとおもしろいもんが見れるぜ。", delay: 4000 }
  ];

  function getCurrentTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
  }

  function appendMessage(text) {
    const row = document.createElement('div');
    row.className = 'message-row';

    const img = document.createElement('img');
    img.className = 'avatar';
    img.src = 'images/hayato.png';
    img.alt = '隼人';

    const content = document.createElement('div');
    content.className = 'message-content';

    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.innerHTML = text; 

    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = getCurrentTime();

    content.appendChild(balloon);
    content.appendChild(time);
    row.appendChild(img);
    row.appendChild(content);
    chatArea.appendChild(row);

    chatArea.scrollTop = chatArea.scrollHeight;
  }

  let cumulativeDelay = 0;
  messagesData.forEach(msg => {
    cumulativeDelay += msg.delay;
    setTimeout(() => {
      appendMessage(msg.text);
    }, cumulativeDelay);
  });

  document.addEventListener('click', (e) => {
    if (e.target.tagName !== 'A') {
      e.preventDefault();
    }
  });

</script>
</body>
</html>
