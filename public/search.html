<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検索結果 | 天水恩寵会</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Yu Mincho", "MS PMincho", "Hiragino Mincho ProN", serif;
    background-color: #fdfcf9;
    color: #5c554d;
    line-height: 1.8;
    letter-spacing: 0.05em;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  header {
    background-color: #ffffff;
    border-bottom: 1px solid #efeae1;
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-link {
    display: block;
    width: 150px;
  }

  .logo-link img {
    width: 100%;
    height: auto;
    display: block;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .nav-menu {
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .nav-menu a {
    font-size: 14px;
    transition: color 0.3s;
  }

  .nav-menu a:hover {
    color: #bfa888;
  }

  .search-form {
    display: flex;
    align-items: center;
    border: 1px solid #efeae1;
    border-radius: 20px;
    background-color: #f7f5f0;
    overflow: hidden;
  }

  .search-input {
    border: none;
    background: transparent;
    padding: 8px 10px 8px 15px;
    font-size: 13px;
    color: #5c554d;
    outline: none;
    width: 150px;
    font-family: inherit;
  }

  .search-input::placeholder {
    color: #a69a8a;
  }

  .search-button {
    border: none;
    background: #bfa888;
    color: #ffffff;
    padding: 8px 15px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: background-color 0.3s;
  }

  .search-button:hover {
    background-color: #a68f6d;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
  }

  .hamburger span {
    display: block;
    width: 25px;
    height: 1px;
    background-color: #5c554d;
    transition: 0.3s;
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 20px;
    box-sizing: border-box;
  }

  .search-header {
    margin-bottom: 40px;
    border-bottom: 1px solid #efeae1;
    padding-bottom: 20px;
  }

  .search-title {
    font-size: 24px;
    font-weight: normal;
    color: #8c7e6b;
    margin: 0 0 10px 0;
  }

  .search-meta {
    font-size: 14px;
    color: #a69a8a;
  }

  .results-container {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .result-item {
    padding-bottom: 30px;
    border-bottom: 1px dashed #efeae1;
  }

  .result-title {
    font-size: 18px;
    color: #bfa888;
    margin: 0 0 5px 0;
    transition: color 0.3s;
  }
  
  .result-title a:hover {
    color: #8c7e6b;
    text-decoration: underline;
  }

  .result-url {
    font-size: 12px;
    color: #a69a8a;
    margin: 0 0 10px 0;
    font-family: sans-serif;
  }

  .result-snippet {
    font-size: 14px;
    color: #5c554d;
    margin: 0;
  }

  .no-results {
    text-align: center;
    padding: 40px 0;
    color: #8c7e6b;
  }

  footer {
    background-color: #ffffff;
    border-top: 1px solid #efeae1;
    padding: 40px 20px;
    text-align: center;
  }

  .footer-meta {
    font-size: 11px;
    color: #b3b3b3;
    font-family: sans-serif;
  }

  .footer-meta p {
    margin: 5px 0;
  }

  @media (max-width: 900px) {
    .nav-menu {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background-color: #ffffff;
      flex-direction: column;
      gap: 0;
      border-bottom: 1px solid #efeae1;
      display: none;
    }

    .nav-menu.active {
      display: flex;
    }

    .nav-menu a {
      padding: 20px;
      border-top: 1px solid #f9f8f6;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }

    .hamburger {
      display: flex;
    }
    
    .search-input {
      width: 100px;
    }
    
    .header-controls {
      gap: 15px;
    }
  }
</style>
</head>
<body>

<header>
  <a href="about.html" class="logo-link">
    <img src="images/logo.png" alt="天水恩寵会">
  </a>
  
  <div class="header-controls">
    <nav class="nav-menu" id="navMenu">
      <a href="about.html">天水恩寵会について</a>
      <a href="founder.html">教主の歩み</a>
      <a href="water.html">奇跡の水</a>
      <a href="contact.html">ご入信・お問い合わせ</a>
    </nav>

    <form class="search-form" action="search.html" method="GET">
      <input type="text" name="q" class="search-input" placeholder="サイト内検索" autocomplete="off" id="searchInput">
      <button type="submit" class="search-button">検索</button>
    </form>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<main>
  <div class="search-header">
    <h1 class="search-title">「<span id="queryDisplay"></span>」の検索結果</h1>
    <p class="search-meta" id="resultCountMeta"></p>
  </div>

  <div class="results-container" id="resultsContainer">
  </div>
</main>

<footer>
  <div class="footer-meta">
    <p>このサイトの内容はフィクションです。登場する人物・団体・名称等は架空のものであり、実在のものとは関係ありません。</p>
  </div>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('navMenu');

  hamburger.addEventListener('click', () => {
    navMenu.classList.toggle('active');
  });

  const searchDatabase = [
    {
      keywords: ["導位"],
      title: "「導位」について",
      url: "member_tier.html",
      description: "「導位」とは、天水恩寵会に集う皆様の階位を表すものです。"
    },
    {
      keywords: ["恵水者"],
      title: "「恵水者」について",
      url: "blessed.html",
      description: "恵水者は、当会において最も数が多く、そして最も一般的な導位であります。"
    },
    {
      keywords: ["導水者"],
      title: "「導水者」について",
      url: "guide.html",
      description: "導水者とは、自らが恩寵を受け取るだけでなく、他者へその恵みを分け与え、組織の秩序を保つ側に立つ存在です。"
    },
    {
      keywords: ["源流守"],
      title: "「源流守」について",
      url: "guard.html",
      description: "導水者として幾多の魂を導き、当会への絶対的な献身と極めて高度な知性、そして開祖の見た真実を完全に理解し受け入れた者のみが到達できる、最も神聖なる導位が「源流守」です。"
    },
    {
      keywords: ["試験","昇華","昇華試験"],
      title: "昇華試験について",
      url: "exam.html",
      description: "日々の清らかなる務めを果たされている恵水者、および導水者の皆様へ。"
    },
    {
      keywords: ["昇華志願書"],
      title: "アクセス制限",
      url: "application_form.html",
      description: "パスワードを入力してください。"
    },
    {
      keywords: ["水原宗秀","水原 宗秀"],
      title: "第二代教主 水原 宗秀",
      url: "2nd_head_priest.html",
      description: "第二代教主である水原 宗秀は、偉大なる初代開祖の実の息子としてこの世に生を受けました。"
    },
    {
      keywords: ["深淵戴水の儀"],
      title: "「深淵戴水の儀」とは",
      url: "ritual.html",
      description: "「深淵戴水の儀」は、天水恩寵会の歴史において、教主の座が次代へと継承される際にのみ執り行われる、最も神聖かつ重要な儀式です。"
    },
    {
      keywords: ["白黎泉"],
      title: "「白黎泉」について",
      url: "spring_spot.html",
      description: "白黎泉は、奇跡の水が湧き出ている唯一の場所です。"
    },
    {
      keywords: ["神代防殻結界"],
      title: "「神代防殻結界」について",
      url: "protection.html",
      description: "神代防殻結界は、深い祈りと緻密な管理によって成り立っています。"
    },
    {
      keywords: ["清めの濾過布"],
      title: "神代防殻結界 備品管理リスト",
      url: "equipment.html",
      description: "本リストは、白黎泉の絶対的な清浄を維持するための「神代防殻結界」に必要な備品・資材の在庫状況です。"
    },
    {
      keywords: ["ヤシロ重工"],
      title: "【管理用】第一ゲート 搬入・入館記録",
      url: "admission_record.html",
      description: "本記録は、神代防殻結界および本部施設を維持するための外部業者の出入りを記録したものです。"
    },
    {
      keywords: ["祈祷師"],
      title: "【管理用】水質検査実施要項（外部委託用）",
      url: "shaman.html",
      description: "当施設「白黎泉」の水質に関する定期サンプリング・成分分析業務の委託内容です。"
    },
    {
      keywords: ["守護聖務部"],
      title: "【管理用】白黎泉 管理マニュアル",
      url: "manual.html",
      description: "本マニュアルは、守護聖務部に所属する者が、白黎泉および神代防殻結界を安全かつ厳密に管理するための基本業務を定めたものです。"
    },
    {
      keywords: ["開祖","初代教主","先代教主","教主","初代開祖"],
      title: "アクセス制限",
      url: "hierarch.html",
      description: "パスワードを入力してください。"
    },
    {
      keywords: ["水原宗一"],
      title: "父、水原宗一の軌跡",
      url: "about_hierarch.html",
      description: "源流守へと昇華された皆様、そしてこの清らかなる導きに辿り着いた方々へ。"
    },
    {
      keywords: ["研究ノート","天文観測記録"],
      title: "【資料保管庫】初代開祖 研究ノート抜粋",
      url: "note.html",
      description: "以下は、白黎泉を発見するに至るまでの間に書き残した手記の一部です。"
    },
    {
      keywords: ["AFL"],
      title: "【資料保管庫】AFL公式声明アーカイブ",
      url: "afl.html",
      description: "公式な声明文のスクリーンショットおよび、日本語訳のアーカイブです。"
    },
    {
      keywords: ["天水士"],
      title: "「天水士」について",
      url: "aqua_savior.html",
      description: "天水士は、我々が生き残るための「希望の光」です。"
    },
  ];

  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q');
    
    const searchInput = document.getElementById('searchInput');
    const queryDisplay = document.getElementById('queryDisplay');
    const resultCountMeta = document.getElementById('resultCountMeta');
    const resultsContainer = document.getElementById('resultsContainer');

    if (query && query.trim() !== "") {
      const sanitizedQuery = query.trim();
      
      searchInput.value = sanitizedQuery;
      queryDisplay.textContent = sanitizedQuery;

      const lowerQuery = sanitizedQuery.toLowerCase();
      
      const matchedResults = searchDatabase.filter(item => {
        return item.keywords.some(keyword => {
          return keyword.toLowerCase() === lowerQuery;
        });
      });

      resultCountMeta.textContent = `該当するページが ${matchedResults.length} 件見つかりました。`;

      if (matchedResults.length > 0) {
        matchedResults.forEach(result => {
          const resultElement = document.createElement('div');
          resultElement.className = 'result-item';
          
          resultElement.innerHTML = `
            <h2 class="result-title"><a href="${result.url}">${result.title}</a></h2>
            <p class="result-snippet">${result.description}</p>
          `;
          
          resultsContainer.appendChild(resultElement);
        });
      } else {
        resultsContainer.innerHTML = `
          <div class="no-results">
            <p>入力されたキーワードに一致するページは見つかりませんでした。</p>
            <p>別のキーワードでお試しいただくか、ひらがな・カタカナ・漢字を変えて再度検索してください。</p>
          </div>
        `;
      }
    } else {
      queryDisplay.textContent = "未入力";
      resultCountMeta.textContent = "キーワードを入力して検索してください。";
      resultsContainer.innerHTML = `
        <div class="no-results">
          <p>検索キーワードが指定されていません。</p>
        </div>
      `;
    }
  });
</script>
</body>
</html>
