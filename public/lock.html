<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクセス制限 | 天水恩寵会</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Yu Mincho", "MS PMincho", "Hiragino Mincho ProN", serif;
    background-color: #fdfcf9;
    color: #5c554d;
    line-height: 1.8;
    letter-spacing: 0.05em;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  header {
    background-color: #ffffff;
    border-bottom: 1px solid #efeae1;
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-link {
    display: block;
    width: 150px;
  }

  .logo-link img {
    width: 100%;
    height: auto;
    display: block;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .nav-menu {
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .nav-menu a {
    font-size: 14px;
    transition: color 0.3s;
  }

  .nav-menu a:hover {
    color: #bfa888;
  }

  .search-form {
    display: flex;
    align-items: center;
    border: 1px solid #efeae1;
    border-radius: 20px;
    background-color: #f7f5f0;
    overflow: hidden;
  }

  .search-input {
    border: none;
    background: transparent;
    padding: 8px 10px 8px 15px;
    font-size: 13px;
    color: #5c554d;
    outline: none;
    width: 150px;
    font-family: inherit;
  }

  .search-input::placeholder {
    color: #a69a8a;
  }

  .search-button {
    border: none;
    background: #bfa888;
    color: #ffffff;
    padding: 8px 15px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: background-color 0.3s;
  }

  .search-button:hover {
    background-color: #a68f6d;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
  }

  .hamburger span {
    display: block;
    width: 25px;
    height: 1px;
    background-color: #5c554d;
    transition: 0.3s;
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding: 80px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .auth-container {
    background-color: #ffffff;
    border: 1px solid #efeae1;
    border-radius: 4px;
    padding: 50px 40px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    text-align: center;
  }

  .auth-icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 20px;
  }

  .page-title {
    font-size: 24px;
    font-weight: normal;
    color: #8c7e6b;
    margin-top: 0;
    margin-bottom: 15px;
  }

  .content-text {
    font-size: 14px;
    line-height: 1.8;
    color: #a69a8a;
    margin-bottom: 30px;
  }

  .password-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .password-input {
    width: 100%;
    padding: 15px;
    border: 1px solid #efeae1;
    border-radius: 4px;
    font-family: inherit;
    font-size: 16px;
    color: #5c554d;
    box-sizing: border-box;
    background-color: #fdfcf9;
    transition: border-color 0.3s;
    text-align: center;
    letter-spacing: 0.2em;
  }

  .password-input:focus {
    outline: none;
    border-color: #bfa888;
  }

  .submit-btn {
    width: 100%;
    background-color: #bfa888;
    color: #ffffff;
    border: none;
    padding: 15px;
    font-size: 15px;
    font-family: inherit;
    border-radius: 30px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .submit-btn:hover {
    background-color: #a68f6d;
  }

  .error-message {
    display: none;
    color: #cc6666;
    font-size: 13px;
    margin-top: 15px;
  }

  footer {
    background-color: #ffffff;
    border-top: 1px solid #efeae1;
    padding: 40px 20px;
    text-align: center;
  }

  .footer-meta {
    font-size: 11px;
    color: #b3b3b3;
    font-family: sans-serif;
  }

  .footer-meta p {
    margin: 5px 0;
  }

  @media (max-width: 900px) {
    .nav-menu {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background-color: #ffffff;
      flex-direction: column;
      gap: 0;
      border-bottom: 1px solid #efeae1;
      display: none;
    }

    .nav-menu.active {
      display: flex;
    }

    .nav-menu a {
      padding: 20px;
      border-top: 1px solid #f9f8f6;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }

    .hamburger {
      display: flex;
    }

    .search-input {
      width: 100px;
    }

    .header-controls {
      gap: 15px;
    }

    .auth-container {
      padding: 40px 20px;
    }
  }
</style>
</head>
<body>

<header>
  <a href="about.html" class="logo-link">
    <img src="images/logo.png" alt="天水恩寵会">
  </a>
  
  <div class="header-controls">
    <nav class="nav-menu" id="navMenu">
      <a href="about.html">天水恩寵会について</a>
      <a href="founder.html">教主の歩み</a>
      <a href="water.html">奇跡の水</a>
      <a href="contact.html">ご入信・お問い合わせ</a>
    </nav>

    <form class="search-form" action="search.html" method="GET">
      <input type="text" name="q" class="search-input" placeholder="サイト内検索" autocomplete="off">
      <button type="submit" class="search-button">検索</button>
    </form>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<main>
  <div class="auth-container">
    <!--
    場面：アクセス制限ページのアイコン
    ターゲット層：隠されたページへアクセスしようとするプレイヤー
    テーマ・コンセプト：封印、神秘、不可侵
    含めたい要素：シンプルで上品な南京錠、あるいは鍵穴のアイコン。水滴のモチーフが鍵穴に組み込まれているようなデザイン。
    カラーテーマ：淡いゴールドまたはベージュ。
    画像サイズ：120*120px
    レイアウトイメージ：背景透過で、アイコンとして中央に配置しやすい形。
    -->
    <img src="images/lock-icon.png" alt="アクセス制限" class="auth-icon">
    
    <h1 class="page-title">アクセス制限</h1>
    <p class="content-text">
      このファイルを閲覧するにはパスワードが必要です。<br>
    </p>

    <form class="password-form" id="passwordForm">
      <input type="password" id="passwordInput" class="password-input" placeholder="パスワードを入力" autocomplete="off">
      <button type="submit" class="submit-btn">アクセスする</button>
    </form>
    
    <p class="error-message" id="errorMessage">パスワードが正しくありません。ご確認の上、再度ご入力ください。</p>
  </div>
</main>

<footer>
  <div class="footer-meta">
    <p>このサイトの内容はフィクションです。登場する人物・団体・名称等は架空であり、実在のものとは関係ありません。</p>
    <p>&lt; ex/00 &gt;</p>
  </div>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('navMenu');

  hamburger.addEventListener('click', () => {
    navMenu.classList.toggle('active');
  });

  const passwordDatabase = {
    "shinkou": "secret-document-1.html",
    "shizuku": "secret-document-2.html",
    "hakobune": "truth-of-world.html",
    "ozone": "final-selection.html"
  };

  const passwordForm = document.getElementById('passwordForm');
  const passwordInput = document.getElementById('passwordInput');
  const errorMessage = document.getElementById('errorMessage');

  passwordForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const inputVal = passwordInput.value.trim();
    
    if (inputVal === "") {
      return;
    }

    if (passwordDatabase[inputVal]) {
      window.location.href = passwordDatabase[inputVal];
    } else {
      errorMessage.style.display = 'block';
      passwordInput.value = "";
    }
  });

  passwordInput.addEventListener('input', function() {
    errorMessage.style.display = 'none';
  });
</script>
</body>
</html>
